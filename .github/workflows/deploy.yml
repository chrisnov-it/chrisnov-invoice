name: Deploy to Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        script: |
          set -e

          APP_DIR="/var/www/chrisnov-invoice"
          SERVICE_NAME="chrisnov-invoice"
          BRANCH="main"

          cd "$APP_DIR"

          if [ -f instance/chrisnov_invoice.db ]; then
            mkdir -p instance/backups
            cp instance/chrisnov_invoice.db "instance/backups/pre_deploy_$(date +%Y%m%d_%H%M%S).db"
          fi

          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          ./venv/bin/pip install -r requirements.txt
          ./venv/bin/flask --app run init-db

          sudo systemctl restart "$SERVICE_NAME"
          sudo systemctl is-active --quiet "$SERVICE_NAME"

          curl --fail --silent --show-error --head http://127.0.0.1:5001/auth/login >/dev/null
