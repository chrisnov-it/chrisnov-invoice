{% extends "auth/base.html" %}

{% block title %}Register - {{ config['BUSINESS_NAME'] }}{% endblock %}

{% block content %}
<div class="mb-6">
    <h2 class="text-xl font-bold text-gray-900">Create account</h2>
    <p class="mt-1 text-sm text-gray-600">Set up access for your invoice workspace.</p>
</div>

<form method="POST" class="space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Name</label>
        <input type="text" id="name" name="name" value="{{ name or '' }}" required autofocus
               class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary"
               placeholder="Your name">
    </div>

    <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" id="email" name="email" value="{{ email or '' }}" required
               class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary"
               placeholder="you@example.com">
    </div>

    <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" name="password" minlength="8" required
               class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary"
               placeholder="At least 8 characters">
    </div>

    <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="8" required
               class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary"
               placeholder="Repeat your password">
    </div>

    <button type="submit" class="w-full rounded-lg bg-primary px-4 py-3 font-semibold text-white transition hover:bg-emerald-700">
        Create account
    </button>
</form>

<p class="mt-6 text-center text-sm text-gray-600">
    Already have an account?
    <a href="{{ url_for('auth.login') }}" class="font-semibold text-primary hover:text-emerald-700">Sign in</a>
</p>
{% endblock %}
